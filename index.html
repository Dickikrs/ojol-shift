<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojol Motor - </title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f0fdf4; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #166534; text-align: center; margin-bottom: 5px; }
        .status-box { text-align: center; background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        #status-text { font-weight: bold; display: block; margin-bottom: 5px; }
        .btn-toggle { background-color: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .info-tarif { background: #fff9db; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 13px; border: 1px dashed #fab005; }
        
        #btn-pesan { width: 100%; background-color: #22c55e; color: white; padding: 15px; border: none; border-radius: 8px; margin-top: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #btn-pesan:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Ojol Motor Libur</h2>
    
    <div class="status-box">
        <span id="status-text" style="color: #ef4444;">● STATUS: SEDANG KERJA SHIFT</span>
        <button class="btn-toggle" onclick="toggleStatus()">Ganti Status Kerja</button>
    </div>

    <label>Nama Anda:</label>
    <input type="text" id="nama" placeholder="Nama pemesan">

    <label>Layanan:</label>
    <select id="layanan">
        <option value="Ojek Motor">Ojek Motor</option>
        <option value="Kirim Barang">Kirim Paket</option>
        <option value="Jastip">Jasa Titip</option>
    </select>

    <label>Titik Jemput (Alamat Lengkap):</label>
    <textarea id="jemput" rows="2" placeholder="Contoh: Jl. Merdeka No. 10"></textarea>

    <label>Titik Tujuan:</label>
    <textarea id="tujuan" rows="2" placeholder="Contoh: Stasiun terdekat"></textarea>

    <div class="info-tarif">
        <strong>Info Tarif:</strong> Rp 3.000 / km<br>
        <em>*Lokasi GPS akan dikirim agar Bang Ojol tidak nyasar.</em>
    </div>

    <button id="btn-pesan" onclick="prosesPesan()" disabled>Maaf, Lagi Off Shift</button>
</div>

<script>
    let isOpen = false;
    let userCoords = "";

    // Ambil lokasi GPS otomatis saat web dibuka
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            userCoords = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        });
    }

    function toggleStatus() {
        isOpen = !isOpen;
        const statusText = document.getElementById('status-text');
        const btnPesan = document.getElementById('btn-pesan');
        if (isOpen) {
            statusText.innerText = "● STATUS: LAGI LIBUR (OPEN)";
            statusText.style.color = "#22c55e";
            btnPesan.disabled = false;
            btnPesan.innerText = "Pesan via WhatsApp";
        } else {
            statusText.innerText = "● STATUS: SEDANG KERJA SHIFT";
            statusText.style.color = "#ef4444";
            btnPesan.disabled = true;
            btnPesan.innerText = "Maaf, Lagi Off Shift";
        }
    }

    function prosesPesan() {
        const nomorWA = "6289623373483"; // GANTI DENGAN NOMOR ANDA
        const nama = document.getElementById('nama').value;
        const layanan = document.getElementById('layanan').value;
        const jemput = document.getElementById('jemput').value;
        const tujuan = document.getElementById('tujuan').value;

        if (!nama || !jemput || !tujuan) {
            alert("Harap isi data dengan lengkap!");
            return;
        }

        const linkMaps = userCoords ? userCoords : "Lokasi GPS tidak diizinkan";

        const pesan = `Halo Bang Ojol, ada orderan baru:%0A%0A` +
                      `*Nama:* ${nama}%0A` +
                      `*Layanan:* ${layanan}%0A` +
                      `*Jemput:* ${jemput}%0A` +
                      `*Tujuan:* ${tujuan}%0A` +
                      `*Tarif:* Rp 3.000/km%0A%0A` +
                      `*Titik GPS Jemput:* ${linkMaps}%0A%0A` +
                      `Cek ongkir & konfirmasi ya Bang!`;

        window.open(`https://wa.me/${nomorWA}?text=${pesan}`, '_blank');
    }
</script>

</body>
</html>
